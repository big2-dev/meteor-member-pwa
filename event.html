<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>イベント | METEO</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b63ce">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="METEO">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <link rel="stylesheet" href="css/event.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body>
<main class="app">

  <header class="page-header">
    <button class="back-btn" onclick="goHome()" aria-label="戻る">
      <span class="material-symbols-rounded">chevron_left</span>
    </button>

    <img src="images/logo-horizontal.png" alt="METEO" class="logo">
    <p class="copy">あなたのゴルフライフを、もっと楽しく。</p>
  </header>

  <section class="page-title">
    <h1>イベント</h1>
    <p>開催予定のイベント情報を確認できます。</p>
  </section>

  <section id="eventArea" class="event-area">
    <div class="loading-card">イベント情報を読み込み中...</div>
  </section>

  <div class="bottom-space"></div>

  <nav class="bottom-nav">
    <button onclick="goHome()">
      <span class="material-symbols-rounded">home</span>
      <small>ホーム</small>
    </button>

    <button onclick="goQR()">
      <span class="material-symbols-rounded">qr_code_2</span>
      <small>会員証</small>
    </button>

    <button class="active" onclick="goEvent()">
      <span class="material-symbols-rounded">event</span>
      <small>イベント</small>
    </button>

    <button onclick="goNews()">
      <span class="material-symbols-rounded">campaign</span>
      <small>お知らせ</small>
    </button>

    <button onclick="goMore()">
      <span class="material-symbols-rounded">menu</span>
      <small>メニュー</small>
    </button>
  </nav>

</main>

<script src="js/event.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
