<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METEO 会員PWA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#f2f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:380px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:24px;
    color:#0b4fa3;
    margin-bottom:8px;
}

.sub{
    color:#777;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#0b4fa3;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#083b7d;
}

.version{
    margin-top:25px;
    color:#999;
    font-size:12px;
}
</style>

</head>

<body>

<div class="login-box">

<img src="images/logo.png" class="logo">

<h1>METEO 会員PWA</h1>

<div class="sub">
会員専用ログイン
</div>

<input
id="memberId"
type="text"
placeholder="会員ID">

<input
id="password"
type="password"
placeholder="パスワード">

<button onclick="login()">
ログイン
</button>

<div id="message" style="margin-top:15px; font-size:14px; color:red;"></div>

<div class="version">
Version 1.0
</div>

</div>

<script>
function login(){
    const memberId = document.getElementById("memberId").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    const API_URL = "https://script.google.com/macros/s/AKfycbxsHYfop671-Fb4GehXwx5XhfZguvlDZqvH2xCusPevwaggSRc3omhxittN7IQHPlC2/exec";

    message.style.color = "red";
    message.textContent = "";

    if(memberId === ""){
        message.textContent = "会員IDを入力してください";
        return;
    }

    if(password === ""){
        message.textContent = "パスワードを入力してください";
        return;
    }

    message.style.color = "#0b4fa3";
    message.textContent = "ログイン確認中です...";

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "login",
            loginId: memberId,
            password: password,
            deviceId: "browser"
        })
    })
    .then(response => response.json())
    .then(result => {
        if(result.success){
            localStorage.setItem("meteor_token", result.token);
            localStorage.setItem("meteor_member_id", result.memberId);

            message.style.color = "green";
            message.textContent = "ログイン成功";
        }else{
            message.style.color = "red";
            message.textContent = result.message;
        }
    })
    .catch(error => {
        message.style.color = "red";
        message.textContent = "通信エラーが発生しました";
        console.error(error);
    });
}
</script>

</body>
</html>
