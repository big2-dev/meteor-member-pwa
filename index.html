<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METEO 会員PWA</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-box">

<img src="images/logo.png" class="logo">

<p class="tagline">
あなたのゴルフライフを、もっと楽しく。
</p>

<input
id="memberId"
type="text"
placeholder="会員ID">

<input
id="password"
type="password"
placeholder="パスワード">

<button onclick="login()">
ログイン
</button>

<div id="message" style="margin-top:15px; font-size:14px; color:red;"></div>

<div class="version">
Version 1.0
</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
